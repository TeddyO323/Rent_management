<!DOCTYPE html>
<html lang="en">
<head>
  {% load static %}
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartRent | {{ page_title }}</title>
  <meta
    name="description"
    content="SmartRent overview dashboard for landlords and property managers."
  >
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Sora:wght@600;700&display=swap"
    rel="stylesheet"
  >
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
  >
  <link rel="stylesheet" href="{% static 'css/dashboard.css' %}">
</head>
<body data-page="{{ page_key }}">
  <div class="background-orb orb-one"></div>
  <div class="background-orb orb-two"></div>
  <div class="background-grid"></div>

  <div class="session-banner">
    <div class="session-banner__text">
      <span class="session-banner__label">Landlord Session</span>
      <strong>{{ request.user.full_name }}</strong>
    </div>
    <form method="post" action="{% url 'logout' %}">
      {% csrf_token %}
      <button type="submit" class="session-banner__button">Sign Out</button>
    </form>
  </div>

  <div class="app-shell">
    <aside class="sidebar" id="sidebar"></aside>
    <div class="app-overlay" id="appOverlay"></div>

    <main class="main-content">
      <header class="topbar reveal" id="pageHeader"></header>
      {% if messages %}
        {% for message in messages %}
          <div class="status-banner">{{ message }}</div>
        {% endfor %}
      {% endif %}
      <div class="page-stack" id="pageContent"></div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  {{ properties_payload|json_script:"server-properties-data" }}
  <script src="{% static 'js/dashboard.js' %}"></script>
</body>
</html>
